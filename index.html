<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ねこ、どこにいる？ | JamSuki Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="brand">🍓 JamSuki Studio</p>
        <h1>ねこ、どこにいる？</h1>
        <p class="sub">隠れられそうな場所をタップして、ねこを見つけよう。</p>
      </div>
      <div class="stats">
        <div><span>ROUND</span><strong id="round">1 / 5</strong></div>
        <div><span>FOUND</span><strong id="score">0</strong></div>
        <div><span>TAP</span><strong id="tries">0</strong></div>
      </div>
    </header>

    <section class="room-card">
      <div class="room" id="room">
        <div class="wall shelf-wall">
          <div class="shelf-board"></div>
          <div class="jar">🍓</div>
          <div class="frame-small">🐱</div>
          <div class="plant-small"></div>
        </div>

        <div class="window">
          <div class="view"><span>☁️</span><span>🌳</span><span>🌸</span></div>
          <div class="curtain curtain-l"></div>
          <div class="curtain curtain-r"></div>
          <div class="window-seat"></div>
        </div>

        <div class="bed">
          <div class="headboard"></div>
          <div class="pillow pink"></div>
          <div class="pillow cream"></div>
          <div class="blanket"></div>
          <div class="bed-base"></div>
        </div>

        <div class="rug"></div>
        <div class="table"><div class="mug">☕</div><div class="book">📖</div></div>

        <div class="cat-tree">
          <div class="pole p1"></div><div class="pole p2"></div>
          <div class="platform top"></div><div class="platform mid"></div>
          <div class="house">🐾</div>
          <div class="toy"></div>
        </div>

        <div class="plant-big">
          <div class="leaf a"></div><div class="leaf b"></div><div class="leaf c"></div><div class="leaf d"></div>
          <div class="pot"></div>
        </div>

        <div class="bookshelf">
          <div class="cat-basket">🐈‍⬛</div>
          <div class="row r1"><span></span><span></span><span></span><span></span></div>
          <div class="row r2"><span></span><span></span><span></span><span></span></div>
          <div class="basket"></div>
          <div class="doors"></div>
        </div>

        <div class="strawberry-house"></div>

        <div class="cat-reveal" id="catReveal">🐱</div>

        <button class="spot bed-spot" data-spot="bed" aria-label="ベッドの下"></button>
        <button class="spot shelf-spot" data-spot="shelf" aria-label="棚"></button>
        <button class="spot curtain-spot" data-spot="curtain" aria-label="大きな窓"></button>
        <button class="spot tree-spot" data-spot="tree" aria-label="キャットタワー"></button>
        <button class="spot plant-spot" data-spot="plant" aria-label="観葉植物"></button>
        <button class="spot bookshelf-spot" data-spot="bookshelf" aria-label="本棚"></button>
        <button class="spot house-spot" data-spot="house" aria-label="いちごハウス"></button>
        <button class="spot table-spot" data-spot="table" aria-label="テーブル"></button>
      </div>
    </section>

    <section class="panel">
      <p id="message" class="message">あやしい場所をタップしてね。</p>
      <div class="actions">
        <button id="nextBtn" class="primary" disabled>次のラウンド</button>
        <button id="resetBtn" class="secondary">最初から</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
