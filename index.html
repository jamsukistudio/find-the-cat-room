<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ねこ、どこにいる？ | JamSuki Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="game">
      <div class="hud">
        <div class="logo">
          <div class="paw">🐾</div>
          <div>
            <h1>ねこ、どこにいる？</h1>
            <p>JamSuki Studio 🍓</p>
          </div>
        </div>
        <div class="scoreBox">
          <span>みつけた数</span>
          <strong><b id="found">0</b> / <b id="total">7</b></strong>
        </div>
        <button id="resetBtn" class="reset">↻</button>
      </div>

      <div class="scene" id="scene">
        <img src="room.png" class="room" alt="かわいい部屋の中で猫を探すゲーム">

        <button class="catSpot bed" data-name="ベッドの下のねこ"></button>
        <button class="catSpot window" data-name="出窓の三毛ねこ"></button>
        <button class="catSpot tower" data-name="キャットタワーの白ねこ"></button>
        <button class="catSpot shelfTop" data-name="本棚の上のねこ"></button>
        <button class="catSpot shelfBox" data-name="本棚の箱ねこ"></button>
        <button class="catSpot cardboard" data-name="ダンボールのしっぽ"></button>
        <button class="catSpot butt" data-name="キャットタワーのしっぽねこ"></button>

        <div id="effectLayer"></div>
        <div id="clear" class="clear hidden">
          <div>
            <p class="clearBig">CLEAR!</p>
            <p>全部みつけたよ 🐱🐾</p>
          </div>
        </div>
      </div>

      <div class="footer">
        <div>
          <p id="message" class="message">部屋の中に隠れている猫をタップしてね。</p>
          <p class="small">見つけた猫には「みつけた！」マークが出るよ。</p>
        </div>
        <div id="badges" class="badges">
          <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
