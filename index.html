<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>るいとまいのかくれんぼ | JamSuki Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="game">
      <div class="hud">
        <div class="title">
          <div class="logo">🐾</div>
          <div>
            <h1>るいとまいの<br class="sp">かくれんぼ</h1>
            <p>JamSuki Studio 🍓</p>
          </div>
        </div>

        <div class="pill">
          <span>ステージ</span>
          <strong><b id="stageNow">1</b> / 3</strong>
        </div>
        <div class="pill">
          <span>みつけた数</span>
          <strong><b id="found">0</b> / <b id="total">4</b></strong>
        </div>
        <div class="pill time">
          <span>タイム</span>
          <strong id="timer">00:00.00</strong>
        </div>
        <button id="resetBtn" class="circle">↻</button>
      </div>

      <div id="scene" class="scene">
        <img id="room" src="room1.png" class="room" alt="かわいい部屋">
        <div id="spots"></div>
        <div id="cats"></div>
        <div id="fx"></div>

        <div id="startPanel" class="overlay">
          <div class="modal">
            <h2>るいとまいを探そう</h2>
            <p>毎回ちがう場所に4匹かくれるよ。<br>ポーズは10種類。見つけたら「にゃ！」</p>
            <button id="startBtn">START 🐾</button>
          </div>
        </div>

        <div id="clearPanel" class="overlay hidden">
          <div class="modal">
            <h2 id="clearTitle">CLEAR!</h2>
            <p id="clearText">次のステージへ進もう。</p>
            <button id="nextBtn">次のステージへ</button>
          </div>
        </div>
      </div>

      <div class="bottom">
        <p id="message">STARTを押してね。</p>
        <div id="poseList" class="pose-list"></div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
