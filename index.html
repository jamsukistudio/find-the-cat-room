<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>るいとまいのかくれんぼ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="brand">
        <div class="paw">🐾</div>
        <div><h1>るいとまいのかくれんぼ</h1><p>るいとまいのおうち</p></div>
      </div>
      <div class="status"><span>ステージ</span><strong id="stageText">1 / 3</strong></div>
      <div class="status"><span>みつけた数</span><strong id="foundText">0 / 4</strong></div>
      <div class="status"><span>タイム</span><strong id="timeText">00:00.00</strong></div>
      <button id="restartBtn" class="roundBtn" aria-label="リスタート">↻</button>
    </header>

    <main class="gameWrap">
      <section class="gameArea" id="gameArea" aria-label="猫を探す部屋">
        <img id="roomImg" class="roomImg" src="assets/bedroom.svg" alt="かわいい部屋" draggable="false">
        <div id="catLayer" class="catLayer"></div>
        <div id="effectLayer" class="effectLayer"></div>
        <div class="hintCard">🐾 かくれている猫を<br><b>4匹</b>みつけてね！</div>
      </section>

      <section class="panel">
        <div class="card howto">
          <h2>あそびかた</h2>
          <ol>
            <li>猫がかくれているよ</li>
            <li>あやしい場所をタップ！</li>
            <li>「にゃ！」と出たら発見</li>
            <li>4匹みつけたら次の部屋へ</li>
          </ol>
        </div>
        <div class="card message"><h2>メッセージ</h2><p id="messageText">寝室に4匹かくれているよ。</p></div>
        <div class="card rooms"><h2>ステージをえらぶ</h2><div id="roomButtons" class="roomButtons"></div></div>
        <div class="card best"><h2>ベストタイム</h2><div class="bestTime" id="bestText">--:--.--</div><button id="clearBestBtn">記録リセット</button></div>
      </section>
    </main>
  </div>

  <div id="clearModal" class="modal hidden">
    <div class="modalBox">
      <h2>ぜんぶ見つけた！</h2>
      <p id="clearText">にゃー！</p>
      <button id="nextBtn">次の部屋へ</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
