<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>るいとまいのかくれんぼ | JamSuki Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="game">
      <div class="top">
        <div class="brand">
          <div class="jar">🍓</div>
          <div>
            <h1>るいとまいの<br class="sp">かくれんぼ</h1>
            <p>JamSuki Studio</p>
          </div>
        </div>
        <div class="meter">
          <span>部屋</span>
          <b id="stageName">寝室</b>
        </div>
        <div class="meter">
          <span>見つけた</span>
          <b><i id="found">0</i>/<i id="total">4</i></b>
        </div>
        <div class="meter">
          <span>TIME</span>
          <b id="timer">0.00</b>
        </div>
        <button id="reset" class="reset">↻</button>
      </div>

      <div id="scene" class="scene bedroom">
        <div class="wall"></div>
        <div class="floor"></div>
        <div id="roomLayer"></div>
        <div id="spotLayer"></div>
        <div id="catLayer"></div>
        <div id="effectLayer"></div>

        <div id="startPanel" class="panel">
          <div class="panel-inner">
            <h2>るいとまいを探そう</h2>
            <p>毎回ちがう場所に4匹かくれるよ。<br>部屋は3つ。全部見つけるまでのタイムを競おう。</p>
            <button id="startBtn">START 🐾</button>
          </div>
        </div>

        <div id="clearPanel" class="panel hidden">
          <div class="panel-inner">
            <h2 id="clearTitle">CLEAR!</h2>
            <p id="clearText"></p>
            <button id="nextBtn">次の部屋へ</button>
          </div>
        </div>
      </div>

      <div class="bottom">
        <p id="message">STARTを押してね。</p>
        <div class="stars" id="badges"></div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
