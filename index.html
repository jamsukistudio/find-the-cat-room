<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>るいとまいのかくれんぼ</title><link rel="stylesheet" href="style.css"></head><body><div id="app"><header class="top"><div class="logo"><span>🐾</span><div><h1>るいとまいのかくれんぼ</h1><p>るいとまいのおうち</p></div></div><div class="panel"><b>ステージ</b><span id="stageNum">1 / 3</span><small id="roomName">ねこのへや（寝室）</small></div><div class="panel"><b>みつけた数</b><span id="foundCount">0 / 4</span></div><div class="panel"><b>タイム</b><span id="timer">00:00.00</span></div><button id="pauseBtn" aria-label="ポーズ">⏸</button></header><main><section class="gameWrap"><div id="room" class="room" aria-label="猫を探す部屋"><div class="hint">🐾 かくれている猫を<br><b>4匹</b>みつけてね！</div></div></section><section class="bottom"><div class="card"><h2>あそびかた</h2><ol><li>猫がかくれているよ</li><li>見つけた場所をタップ！</li><li>「にゃ！」と出てくるよ♪</li><li>4匹みつけたら次の部屋へ</li></ol></div><div class="card"><h2>ステージをえらぶ</h2><div id="stageButtons" class="stages"></div></div><div class="card poses"><h2>ポーズは各猫10種類</h2><p>るいたん：白猫・ピンク鼻・鼻下の黒い模様・長めしっぽ</p><p>まいたん：三毛・固定模様・大きな目・短めしっぽ</p></div><div class="card best"><h2>ベストタイム</h2><div id="bestTime">--:--.--</div><button id="resetBest">記録リセット</button></div></section></main><footer id="message">🐾 るいたんとまいたんをみつけてね 🐾</footer><div id="overlay" class="overlay hidden"><div><h2 id="overlayTitle">ポーズ中</h2><p id="overlayText"></p><button id="overlayBtn">つづける</button></div></div></div><script src="game.js"></script></body></html>
