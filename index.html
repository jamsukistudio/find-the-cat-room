<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ねこ、どこにいる？ | JamSuki Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="game">
      <div class="hud">
        <div class="title">
          <div class="paw">🐾</div>
          <div>
            <h1>ねこ、どこにいる？</h1>
            <p>JamSuki Studio 🍓</p>
          </div>
        </div>
        <div class="box">
          <span>ステージ</span>
          <strong id="stageText">1 / 3</strong>
        </div>
        <div class="box">
          <span>みつけた数</span>
          <strong><b id="found">0</b> / <b id="total">4</b></strong>
        </div>
        <button id="resetBtn" class="round">↻</button>
      </div>

      <div class="scene" id="scene">
        <img id="roomImg" class="room" src="room1.png" alt="猫探しの部屋">
        <div id="spots"></div>
        <div id="effect"></div>
        <div id="clear" class="clear hidden">
          <div>
            <p id="clearTitle">CLEAR!</p>
            <button id="nextBtn">次の部屋へ</button>
          </div>
        </div>
      </div>

      <div class="footer">
        <p id="message">家具に隠れている猫をタップしてね。</p>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
